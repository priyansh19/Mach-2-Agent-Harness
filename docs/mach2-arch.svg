<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820">
  <defs>
    <marker id="a"     markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#94a3b8"/></marker>
    <marker id="a-rev" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto-start-reverse"><polygon points="0 0,7 2.5,0 5" fill="#94a3b8"/></marker>
    <marker id="a-grn" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#4ade80"/></marker>
    <marker id="a-org" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#fb923c"/></marker>
    <marker id="a-pur" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#c084fc"/></marker>
    <marker id="a-yel" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#facc15"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="820" fill="#0f172a"/>

  <!-- Title -->
  <text x="500" y="26" text-anchor="middle" fill="#f1f5f9" font-family="monospace" font-size="15" font-weight="bold" letter-spacing="1">MACH2 — MULTI-AGENT ReAct HARNESS</text>
  <text x="500" y="42" text-anchor="middle" fill="#334155" font-family="monospace" font-size="8.5">LangChain · LangGraph · CrewAI · Ollama gemma4 · ChromaDB · FastAPI · Langfuse · React+TS</text>

  <!-- ── USER ── -->
  <rect x="420" y="55" width="160" height="40" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="500" y="80" text-anchor="middle" font-family="monospace" fill="#60a5fa" font-size="13" font-weight="bold">USER</text>

  <!-- ── UI PANEL (top-right) ── -->
  <rect x="730" y="55" width="250" height="140" rx="6" fill="#1e1a3f" stroke="#a855f7" stroke-width="2"/>
  <text x="855" y="75" text-anchor="middle" font-family="monospace" fill="#c084fc" font-size="10" font-weight="bold">UI: THINKING &amp; CRITIQUE PANEL</text>
  <line x1="740" y1="82" x2="970" y2="82" stroke="#2d2060" stroke-width="1"/>
  <text x="745" y="97"  font-family="monospace" fill="#7c3aed" font-size="8">Tab 1   Thinking trace (ReAct steps)</text>
  <text x="745" y="112" font-family="monospace" fill="#7c3aed" font-size="8">Tab 2   Critiques (severity · category)</text>
  <text x="745" y="127" font-family="monospace" fill="#7c3aed" font-size="8">SSE     thinking · critique · resolved</text>
  <text x="745" y="142" font-family="monospace" fill="#7c3aed" font-size="8">Filter  by agent · severity · round</text>
  <text x="745" y="157" font-family="monospace" fill="#4c1d95" font-size="8">React + TypeScript + Vite  (opt-in panel)</text>
  <text x="745" y="183" font-family="monospace" fill="#312e81" font-size="7.5">blocker · major · minor · info</text>

  <!-- ── MAIN HARNESS ── -->
  <rect x="310" y="155" width="330" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="475" y="176" text-anchor="middle" font-family="monospace" fill="#93c5fd" font-size="12" font-weight="bold">MAIN HARNESS</text>
  <text x="475" y="193" text-anchor="middle" font-family="monospace" fill="#334155" font-size="8.5">Central Orchestrator · Routes tasks · ReAct loop</text>

  <!-- Arrows: top section -->
  <!-- User ↔ Main Harness -->
  <line x1="500" y1="95" x2="490" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)" marker-start="url(#a-rev)"/>
  <!-- Main Harness → UI (SSE) -->
  <path d="M 640 170 C 685 165 700 145 730 115" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-pur)"/>
  <text x="690" y="158" font-family="monospace" fill="#7c3aed" font-size="8">SSE</text>

  <!-- ── RESEARCH AGENT (left column) ── -->
  <rect x="30" y="260" width="255" height="235" rx="8" fill="#031c0f" stroke="#22c55e" stroke-width="2"/>
  <text x="157" y="279" text-anchor="middle" font-family="monospace" fill="#22c55e" font-size="10" font-weight="bold">RESEARCH AGENT  (L0–L1)</text>

  <!-- L0: Orchestrator -->
  <rect x="48" y="288" width="219" height="42" rx="5" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="157" y="305" text-anchor="middle" font-family="monospace" fill="#4ade80" font-size="9" font-weight="bold">L0 · RESEARCH ORCHESTRATOR</text>
  <text x="157" y="320" text-anchor="middle" font-family="monospace" fill="#14532d" font-size="7.5">Decomposes goal · Spawns scouts · Dynamic fan-out</text>

  <!-- L0: Scout Pool -->
  <rect x="48" y="342" width="219" height="42" rx="5" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="157" y="358" text-anchor="middle" font-family="monospace" fill="#4ade80" font-size="9" font-weight="bold">L0 · SCOUT POOL</text>
  <text x="157" y="373" text-anchor="middle" font-family="monospace" fill="#14532d" font-size="7.5">Independent ReAct · web / SO / design / icons / devops</text>

  <!-- L1: Research Synthesizer -->
  <rect x="48" y="396" width="219" height="42" rx="5" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="157" y="412" text-anchor="middle" font-family="monospace" fill="#4ade80" font-size="9" font-weight="bold">L1 · RESEARCH SYNTHESIZER</text>
  <text x="157" y="427" text-anchor="middle" font-family="monospace" fill="#14532d" font-size="7.5">Dedupes · Ranks · Structures scout findings</text>

  <!-- Arrows within Research Agent -->
  <line x1="157" y1="330" x2="157" y2="342" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a-grn)"/>
  <line x1="157" y1="384" x2="157" y2="396" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a-grn)"/>

  <!-- ── CRITIC PIPELINE (center-right) ── -->
  <rect x="310" y="260" width="280" height="435" rx="8" fill="#1c0800" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="279" text-anchor="middle" font-family="monospace" fill="#f97316" font-size="10" font-weight="bold">CRITIC PIPELINE  (L2–L7)</text>

  <!-- L2 Fact -->
  <rect x="325" y="288" width="250" height="42" rx="5" fill="#2d1000" stroke="#ea580c" stroke-width="1.5"/>
  <text x="450" y="305" text-anchor="middle" font-family="monospace" fill="#fb923c" font-size="9" font-weight="bold">L2 · FACT CRITIC</text>
  <text x="450" y="320" text-anchor="middle" font-family="monospace" fill="#431407" font-size="7.5">Sources exist · Recency · Cross-scout contradictions</text>

  <!-- L3 Gap -->
  <rect x="325" y="342" width="250" height="42" rx="5" fill="#2d1000" stroke="#ea580c" stroke-width="1.5"/>
  <text x="450" y="358" text-anchor="middle" font-family="monospace" fill="#fb923c" font-size="9" font-weight="bold">L3 · GAP CRITIC</text>
  <text x="450" y="373" text-anchor="middle" font-family="monospace" fill="#431407" font-size="7.5">Missing dimensions → spawn_scout recommendations</text>

  <!-- L4 Logic -->
  <rect x="325" y="396" width="250" height="42" rx="5" fill="#2d1000" stroke="#ea580c" stroke-width="1.5"/>
  <text x="450" y="412" text-anchor="middle" font-family="monospace" fill="#fb923c" font-size="9" font-weight="bold">L4 · LOGIC CRITIC</text>
  <text x="450" y="427" text-anchor="middle" font-family="monospace" fill="#431407" font-size="7.5">Scope fit · Internal consistency · Evidence alignment</text>

  <!-- L5 Efficiency -->
  <rect x="325" y="450" width="250" height="42" rx="5" fill="#2d1000" stroke="#ea580c" stroke-width="1.5"/>
  <text x="450" y="466" text-anchor="middle" font-family="monospace" fill="#fb923c" font-size="9" font-weight="bold">L5 · EFFICIENCY CRITIC</text>
  <text x="450" y="481" text-anchor="middle" font-family="monospace" fill="#431407" font-size="7.5">Redundancy · Verbosity · Token budget</text>

  <!-- Divider before synthesis -->
  <line x1="335" y1="507" x2="575" y2="507" stroke="#3d1500" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="519" text-anchor="middle" font-family="monospace" fill="#431407" font-size="8">critique ledger ▼</text>

  <!-- L6 Synthesizer -->
  <rect x="325" y="527" width="250" height="42" rx="5" fill="#1a2d00" stroke="#84cc16" stroke-width="1.5"/>
  <text x="450" y="543" text-anchor="middle" font-family="monospace" fill="#a3e635" font-size="9" font-weight="bold">L6 · SYNTHESIZER AGENT</text>
  <text x="450" y="558" text-anchor="middle" font-family="monospace" fill="#365314" font-size="7.5">Writes user-facing answer from approved ledger</text>

  <!-- L7 Sign-off -->
  <rect x="325" y="581" width="250" height="42" rx="5" fill="#2d1000" stroke="#ea580c" stroke-width="1.5"/>
  <text x="450" y="597" text-anchor="middle" font-family="monospace" fill="#fb923c" font-size="9" font-weight="bold">L7 · SIGN-OFF CRITIC</text>
  <text x="450" y="612" text-anchor="middle" font-family="monospace" fill="#431407" font-size="7.5">approved → User  ║  revision → L6  (max N rounds)</text>

  <!-- Arrows within Critic Pipeline -->
  <line x1="450" y1="330" x2="450" y2="342" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a-org)"/>
  <line x1="450" y1="384" x2="450" y2="396" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a-org)"/>
  <line x1="450" y1="438" x2="450" y2="450" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a-org)"/>
  <line x1="450" y1="492" x2="450" y2="527" stroke="#84cc16" stroke-width="1.5" marker-end="url(#a-grn)"/>
  <line x1="450" y1="569" x2="450" y2="581" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a-org)"/>

  <!-- ── CROSS-COMPONENT ARROWS ── -->

  <!-- Main Harness → Research Agent (elbow left-down) -->
  <path d="M 340 205 L 157 205 L 157 260" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Main Harness → Critic Pipeline (down) -->
  <line x1="475" y1="205" x2="450" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Research Agent L1 → Critic Pipeline L2 (right+up curve) -->
  <path d="M 267 417 C 296 417 296 309 325 309" fill="none" stroke="#4ade80" stroke-width="1.5" marker-end="url(#a-grn)"/>

  <!-- L3 Gap → re-scout → Scout Pool (left, dashed yellow) -->
  <line x1="325" y1="363" x2="267" y2="363" stroke="#facc15" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-yel)"/>
  <text x="295" y="356" text-anchor="middle" font-family="monospace" fill="#a16207" font-size="7.5">re-scout</text>

  <!-- L7 revision loop → L6 (right-side curve) -->
  <path d="M 575 602 C 615 602 615 548 575 548" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-org)"/>
  <text x="628" y="578" text-anchor="middle" font-family="monospace" fill="#ea580c" font-size="7.5">revision</text>

  <!-- L7 approved → User (route up right side at x=710) -->
  <path d="M 575 602 L 710 602 L 710 75 L 580 75" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-grn)"/>
  <text font-family="monospace" fill="#16a34a" font-size="7.5" text-anchor="middle" transform="translate(720,360) rotate(-90)">approved</text>

  <!-- ── SHARED MEMORY ── -->
  <rect x="310" y="740" width="280" height="50" rx="6" fill="#1c1200" stroke="#fbbf24" stroke-width="2"/>
  <text x="450" y="762" text-anchor="middle" font-family="monospace" fill="#fbbf24" font-size="10" font-weight="bold">SHARED MEMORY</text>
  <text x="450" y="778" text-anchor="middle" font-family="monospace" fill="#78350f" font-size="8">ChromaDB · nomic-embed-text (Ollama)  · Phase 5+</text>

  <!-- Research Agent → Shared Memory -->
  <path d="M 157 495 L 157 765 L 310 765" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-yel)"/>

  <!-- Critic Pipeline → Shared Memory -->
  <line x1="450" y1="695" x2="450" y2="740" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-yel)"/>

  <!-- ── LEGEND ── -->
  <rect x="635" y="530" width="340" height="125" rx="6" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="805" y="548" text-anchor="middle" font-family="monospace" fill="#475569" font-size="8.5" font-weight="bold">LEGEND</text>
  <line x1="650" y1="562" x2="690" y2="562" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="698" y="566" font-family="monospace" fill="#475569" font-size="8">data / orchestration flow</text>
  <line x1="650" y1="578" x2="690" y2="578" stroke="#4ade80" stroke-width="1.5" marker-end="url(#a-grn)"/>
  <text x="698" y="582" font-family="monospace" fill="#475569" font-size="8">research output</text>
  <line x1="650" y1="594" x2="690" y2="594" stroke="#facc15" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-yel)"/>
  <text x="698" y="598" font-family="monospace" fill="#475569" font-size="8">re-scout feedback loop</text>
  <line x1="650" y1="610" x2="690" y2="610" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-org)"/>
  <text x="698" y="614" font-family="monospace" fill="#475569" font-size="8">revision loop (L7 → L6)</text>
  <line x1="650" y1="626" x2="690" y2="626" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-grn)"/>
  <text x="698" y="630" font-family="monospace" fill="#475569" font-size="8">approved → User</text>
  <line x1="650" y1="642" x2="690" y2="642" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-pur)"/>
  <text x="698" y="646" font-family="monospace" fill="#475569" font-size="8">SSE events → UI panel</text>

  <!-- ── TECH STACK ── -->
  <rect x="635" y="665" width="340" height="120" rx="6" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="805" y="682" text-anchor="middle" font-family="monospace" fill="#475569" font-size="8.5" font-weight="bold">TECH STACK</text>
  <text x="650" y="697"  font-family="monospace" fill="#374151" font-size="8">Agent framework   LangChain + LangGraph + CrewAI</text>
  <text x="650" y="712"  font-family="monospace" fill="#374151" font-size="8">Local LLM         Ollama · gemma4:latest</text>
  <text x="650" y="727"  font-family="monospace" fill="#374151" font-size="8">Embeddings        nomic-embed-text via Ollama</text>
  <text x="650" y="742"  font-family="monospace" fill="#374151" font-size="8">Observability     Langfuse (self-hosted)</text>
  <text x="650" y="757"  font-family="monospace" fill="#374151" font-size="8">API server        FastAPI + Uvicorn</text>
  <text x="650" y="772"  font-family="monospace" fill="#374151" font-size="8">Vector DB         ChromaDB</text>
</svg>
